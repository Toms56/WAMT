name: Run test

on:
  pull_request:
    branches: [main, develop]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 #extraction du code

      - name: Setup JDK 21
        uses: actions/setup-java@v4 #v4 ==> numero de vesion de l'action
        with:
          distribution: 'temurin' #Distribution open source
          java-version: 21
          cache: 'gradle'

      #Donner les droits au fichier gradlew de s'executer
      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew #Commande shell

      - name: Run unit test
        run: ./gradlew clean testDebug